# ─────────────────────────────────────────────────────────────
# OneCup CI — 构建与测试
#
# 每次 push 到 main 或提 PR 时自动运行:
#   - backend  : .NET 构建 + 全量单元/集成测试(集成测试用 InMemory,无需 PostgreSQL)
#   - frontend : npm ci + vitest 测试 + vite 构建
# 两个 Job 并行执行,互不阻塞。
# ─────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # 允许在 GitHub 页面手动触发

# 同一分支的并发运行只保留最新一次,取消旧的(省额度)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 后端:构建 + 测试 ───────────────────────────────────────
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/

      - name: Build
        run: dotnet build backend/ --no-restore -c Release

      - name: Test
        run: dotnet test backend/ --no-build -c Release --verbosity normal

  # ── 前端:测试 + 构建 ───────────────────────────────────────
  frontend:
    name: Frontend Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
